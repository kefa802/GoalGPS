import java.util.Properties

plugins {
    id 'com.android.application'
}

// ✅ ビルド毎にバージョンを自動カウントアップ
def versionPropsFile = file('../version.properties') // プロジェクトルートに保存
def Properties versionProps = new Properties()

if (versionPropsFile.exists()) {
    versionProps.load(new FileInputStream(versionPropsFile))
} else {
    versionProps['VERSION_CODE'] = '1'
    versionProps['VERSION_NAME'] = '1.0.0'
    versionPropsFile.createNewFile()
    versionProps.store(versionPropsFile.newWriter(), null)
}

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(":app:assembleDebug")) {
        def code = versionProps['VERSION_CODE'].toInteger()
        versionProps['VERSION_CODE'] = (code + 1).toString()
        versionProps.store(versionPropsFile.newWriter(), null)
    }
}

versionProps.load(new FileInputStream(versionPropsFile))
def vCode = versionProps['VERSION_CODE'].toInteger()
def vName = versionProps['VERSION_NAME']

android {
    namespace 'com.example.gpslog'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.gpslog"
        minSdk 24
        targetSdk 34
        versionCode vCode
        versionName vName
    }

    // ✅ エラー解決：BuildConfig 機能を有効化
    buildFeatures {
        buildConfig true
    }

    buildTypes {
        debug {
            buildConfigField "String", "VERSION_NAME", "\"${vName}.${vCode}\""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'org.osmdroid:osmdroid-android:6.1.16'
    implementation "androidx.room:room-runtime:2.5.2"
    annotationProcessor "androidx.room:room-compiler:2.5.2"
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
    implementation 'com.google.code.gson:gson:2.10.1'
}
