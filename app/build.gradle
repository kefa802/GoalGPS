import java.util.Properties

plugins {
    id 'com.android.application'
}

// ✅ ビルド毎にバージョンを自動カウントアップするタスク
def versionPropsFile = file('version.properties')
def Properties versionProps = new Properties()

if (versionPropsFile.exists()) {
    versionProps.load(new FileInputStream(versionPropsFile))
} else {
    // ファイルがない場合のデフォルト（手順1をやればここには来ない）
    versionProps['VERSION_CODE'] = '1'
    versionProps['VERSION_NAME'] = '1.0.0'
    versionPropsFile.createNewFile()
    versionProps.store(versionPropsFile.newWriter(), null)
}

// assembleDebug タスクが実行される時だけカウントアップする
gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(":app:assembleDebug")) {
        def code = versionProps['VERSION_CODE'].toInteger()
        versionProps['VERSION_CODE'] = (code + 1).toString()
        versionProps.store(versionPropsFile.newWriter(), null)
    }
}

// インクリメント後の最新の値を読み込む
versionProps.load(new FileInputStream(versionPropsFile))
def vCode = versionProps['VERSION_CODE'].toInteger()
def vName = versionProps['VERSION_NAME']

android {
    namespace 'com.example.gpslog'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.gpslog"
        minSdk 24
        targetSdk 34
        versionCode vCode // 自動更新されたコードを使用 ✅
        versionName vName // 自動更新された名前を使用 ✅
    }
    
    // buildConfigField を追加して、Javaコードからバージョン名を取得できるようにする ✅
    buildTypes {
        debug {
            buildConfigField "String", "VERSION_NAME", "\"${vName}\""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'org.osmdroid:osmdroid-android:6.1.16'
    def room_version = "2.5.2"
    implementation "androidx.room:room-runtime:$room_version"
    annotationProcessor "androidx.room:room-compiler:$room_version"
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
    implementation 'com.google.code.gson:gson:2.10.1'
}
